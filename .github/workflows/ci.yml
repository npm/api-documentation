name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "api/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Generate OpenAPI spec
        run: npm run generate

      - name: Validate OpenAPI spec
        run: npm run validate
